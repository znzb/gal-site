<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏网站初始化</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .info {
            background: #f8f9fa;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            font-family: monospace;
            word-break: break-all;
        }
        .status {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 游戏网站初始化</h1>
        <p>点击下方按钮通过后端API初始化数据库</p>
        <div class="info">后端地址: <br>https://game-api-p1zc.onrender.com</div>
        <button class="btn" onclick="initData()">🚀 初始化数据库</button>
        <div id="status" class="status" style="display:none;"></div>
    </div>
    <script>
        async function initData() {
            const btn = document.querySelector('.btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = '⏳ 初始化中...';
            status.style.display = 'block';
            status.className = 'status';
            status.innerHTML = '正在初始化数据，请稍候...';
            
            try {
                const response = await fetch('https://game-api-p1zc.onrender.com/api/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    status.className = 'status success';
                    status.innerHTML = `✅ 成功! 添加了 ${data.counts.games} 个游戏`;
                } else {
                    status.className = 'status error';
                    status.innerHTML = `❌ 失败: ${data.error}`;
                }
            } catch (err) {
                status.className = 'status error';
                status.innerHTML = `❌ 请求失败: ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 初始化数据库';
            }
        }
    </script>
</body>
</html>
